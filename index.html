<!doctype html>
<html lang="de" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <!-- Icons stammen aus dem echten Markenlogo (public/logo/af-logo.png) — siehe scripts/generate-icons.py. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f1efe9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0c0e" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Muskelfinder — Nachschlagewerk & Lern-Tool für die Skelettmuskulatur." />
    <title>Anatomie Fokus · Muskelfinder</title>
    <!-- Theme vor dem ersten Paint setzen (kein Flash). Liest den persistierten Zustand-Store;
         ohne eigene Wahl gilt, was das Geraet eingestellt hat (dieselbe Regel wie in
         `useThemeStore`) — sonst blendet die App ein Handy im Nachtmodus. -->
    <script>
      (function () {
        function system() {
          return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        }
        var t;
        try {
          var raw = localStorage.getItem('mf.theme');
          t = raw ? (JSON.parse(raw).state || {}).theme : null;
        } catch (e) {
          t = null;
        }
        document.documentElement.setAttribute('data-theme', t === 'dark' || t === 'light' ? t : system());
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
